[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=31536000"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=31536000"

[[headers]]
  for = "/motion.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=31536000"

[[headers]]
  for = "/three-bg.js"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=31536000"
